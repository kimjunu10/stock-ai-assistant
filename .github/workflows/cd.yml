name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/kimjunu10/stock-ai-assistant-backend:${{ github.event.workflow_run.head_sha }}
  REMOTE_DIR: /opt/stock-ai-assistant

jobs:
  deploy:
    name: Build and deploy backend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Configure VM SSH access
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Copy the production Compose file
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          ssh "$VM_USER@$VM_HOST" "sudo install -d -o '$VM_USER' -g '$VM_USER' '$REMOTE_DIR'"
          scp deploy/docker-compose.prod.yml "$VM_USER@$VM_HOST:$REMOTE_DIR/docker-compose.yml"

      - name: Pull and start the tested image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$VM_USER@$VM_HOST" \
            "docker login ghcr.io --username '$GHCR_USER' --password-stdin"
          ssh "$VM_USER@$VM_HOST" \
            "cd '$REMOTE_DIR' && BACKEND_IMAGE='$BACKEND_IMAGE' docker compose pull && BACKEND_IMAGE='$BACKEND_IMAGE' docker compose up -d --remove-orphans"
          ssh "$VM_USER@$VM_HOST" "docker logout ghcr.io"

      - name: Verify deployment
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          ssh "$VM_USER@$VM_HOST" \
            "cd '$REMOTE_DIR' && BACKEND_IMAGE='$BACKEND_IMAGE' docker compose ps && BACKEND_IMAGE='$BACKEND_IMAGE' docker compose logs --tail=100 backend"
          ssh "$VM_USER@$VM_HOST" \
            "for attempt in \$(seq 1 12); do curl --fail --silent http://127.0.0.1:8000/docs >/dev/null && exit 0; sleep 5; done; exit 1"
